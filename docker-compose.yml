services:
  demo-app:
    image: demo-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Override JVM options here if needed
      - JAVA_OPTS=-Xms256m -Xmx512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/greeting"]
      interval: 30s
      timeout: 5s
      retries: 3

