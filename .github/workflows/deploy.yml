name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          sudo tailscale up \
            --authkey "$TAILSCALE_AUTHKEY" \
            --accept-dns=true \
            --accept-routes=true \
            --hostname github-actions-deploy
          tailscale status

      - name: Deploy Docker image to VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app
          IMAGE_TAG: ${{ inputs.image_tag }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: IMAGE_NAME,IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -e

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull "$IMAGE_NAME:$IMAGE_TAG"
            docker stop demo-app || true
            docker rm demo-app || true
            docker run -d \
              --name demo-app \
              --restart unless-stopped \
              -p 8080:8080 \
              -e JAVA_OPTS="-Xms256m -Xmx512m -Djava.security.egd=file:/dev/./urandom" \
              "$IMAGE_NAME:$IMAGE_TAG"
            docker image prune -f || true
            docker ps --filter "name=demo-app"

